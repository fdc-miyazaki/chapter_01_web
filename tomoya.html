<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 30px;
        }

        .profile-card{
            width: 400px;
            margin: auto;
            background-color: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            color: #333;
            text-align: center;
        }

        p{
            font-size: 18px;
            color: #555;
            line-height: 1.8;
        }

        .label{
            font-weight: bold;
            color: #222;
        }
    </style>
</head>

<body>

    <div class="profile-card">
        <h1>プロフィール</h1>

        <p>
            <span class="label">名前：</span>
            宮﨑知也
        </p>

        <p>
            <span class="label">経歴：</span>
            入社1年目・未経験で入社
        </p>

        <p>
            <span class="label">コメント：</span><br>
            日々プログラミングを学びながら成長中です。
        </p>
    </div>

</body>
</html>
